<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- ======================================================================
       1. CORE META METRICS & STRUCTURAL GRAPH PRB-HEADERS
       ====================================================================== -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Dynamic Engine Title Injection Target -->
    <title id="meta-title"></title>
    <meta name="description" id="meta-desc" content="" />
    
    <!-- Primary Theme Vector Styling Token -->
    <meta name="theme-color" content="#0ea5e9" />

    <!-- Performance Infrastructure: Resource Hints & CDN Preconnections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Main Stylesheet Injection Layer -->
    <link rel="stylesheet" href="index.css" />
</head>
<body>

    <!-- Strict Keyboard Accessibility Requirement: Skip Navigation Vector Links -->
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <!-- ======================================================================
       2. GLASSMORPHIC FLOATING HEADER INTERACTION REGISTRY
       ====================================================================== -->
    <header class="nav-header" id="app-navigation">
        <div class="nav-container">
            
            <!-- Brand Profile Identity Subsystem Area -->
            <a href="#" class="brand-block" id="nav-brand-link" aria-label="Home">
                <div class="brand-logo" id="nav-brand-logo" aria-hidden="true">OB</div>
                <div class="brand-text">
                    <span class="brand-title" id="nav-brand-title">Osama Barakat</span>
                    <span class="brand-subtitle" id="nav-brand-subtitle">DATA SCIENTIST</span>
                </div>
            </a>

            <!-- Standard Screen Space Navigation Subsystem Matrix -->
            <nav aria-label="Desktop Navigation View Menu">
                <ul class="nav-menu" id="desktop-primary-nav-menu">
                    <!-- Target Destination for Programmatic JavaScript Navigation Mapping Links -->
                </ul>
            </nav>

            <!-- Control Actions Array Shell -->
            <div class="nav-actions">
                <a href="#contact" class="btn btn--primary" id="desktop-nav-cta-btn">Get in Touch</a>
                
                <!-- Hamburger Trigger Mechanism optimized for Assistive Technology Overlays -->
                <button class="menu-toggle" id="mobile-menu-trigger" aria-expanded="false" aria-controls="mobile-navigation" aria-label="Toggle navigation">
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ======================================================================
       3. OFF-CANVAS MOBILE RE-DRAW ARCHITECTURE SHEETS
       ====================================================================== -->
    <div class="mobile-overlay" id="mobile-nav-overlay" aria-hidden="true"></div>
    <div class="mobile-sheet" id="mobile-navigation" role="dialog" aria-modal="true" aria-label="Mobile Navigation Drawer Modal Menu Window">
        <!-- Target Core for Programmatic Mobile Application Link Injections -->
        <ul id="mobile-nav-menu" style="list-style: none; display: grid; gap: 16px;"></ul>
    </div>

    <!-- ======================================================================
       4. SYSTEM COMPONENT RUNTIME RUNWAY (MAIN ROUTING COMPONENT)
       ====================================================================== -->
    <main id="main-content" tabindex="-1">
        
        <!-- Section A: Hero Interface Matrix -->
        <section class="section hero-section">
            <div class="container">
                <!-- Programmatic Hero Engine Component Injections Mount Point -->
                <div class="hero-grid" id="hero-layout-viewport-root"></div>
            </div>
        </section>

        <!-- Section B: Performance Strategy Analytics Layer (Value Cards Portfolio Block) -->
        <section id="about" class="section" style="background-color: var(--bg-surface);">
            <div class="container">
                <h2 class="section-title" id="value-section-title"></h2>
                <p class="section-subtitle" id="value-section-subtitle"></p>
                <!-- Flexible Structural Target Mount Context supporting Mobile Swiper Modules -->
                <div class="cards-grid" id="value-cards-viewport-root"></div>
            </div>
        </section>

        <!-- Section C: Enterprise Operations / Experience Infrastructure -->
        <section id="experience" class="section">
            <div class="container">
                <div class="layout-split">
                    <!-- Executive Summary Columns Layer -->
                    <div id="experience-intro-viewport-root"></div>
                    <!-- Performance Stack Runtimes Accordion Container Matrix -->
                    <div id="experience-engine-viewport-root"></div>
                </div>
            </div>
        </section>

        <!-- Combined Expertise Matrix Engine Pipeline -->
        <section id="expertise-combined" class="section">
            <div class="container">
                <div class="layout-split">
                    <!-- Left Column: Featured Expertise (Will be sticky) -->
                    <div id="ai-solutions-viewport-root" class="sticky-column"></div>

                    <!-- Right Column: Technical Stack (Will scroll) -->
                    <div id="skills-matrix-viewport-root"></div>
                </div>
            </div>
        </section>

        <!-- Section D: Core Capabilities Matrix Architecture Section -->
        <section id="skills" class="section" style="background-color: var(--bg-surface);">
            <div class="container">
                <h2 class="section-title" id="skills-section-title"></h2>
                <p class="section-subtitle" id="skills-section-subtitle"></p>
                <!-- Target Component Block Container Shell -->
                <div class="cards-grid" id="skills-matrix-viewport-root"></div>
            </div>
        </section>

        <!-- Section E: Academic Foundation Timeline Subsystem Block (Centered Optimization Matrix) -->
        <section id="education" class="education-section">
            <div class="education-intro">
                <h2 id="education-section-title" class="education-title">Education</h2>
            </div>
            <div class="timeline-wrapper">
                <!-- Center Balanced Dynamic Timeline Generation Container -->
                <div id="education-engine-viewport-root" class="timeline-track"></div>
            </div>
        </section>   

        <!-- Section F: Localization / Polyglot Matrices Block Container Section -->
        <section id="languages" class="section" style="background-color: var(--bg-primary);">
            <div class="container">
                <h2 class="section-title" style="margin-bottom: 32px;">Languages</h2>
                <!-- Target Target Grid Interface Component Layout Mount Block -->
                <div id="languages-matrix-viewport-root" class="languages-grid"></div>
            </div>
        </section>

        <!-- Section G: Centered Communication Matrix Channels Routing Architecture Section -->
        <section id="contact" class="section">
            <div class="container contact-container-centered">
                <h2 class="section-title" id="contact-section-title"></h2>
                <p class="section-subtitle" id="contact-section-subtitle"></p>
                
                <!-- Multi-Channel Interaction Endpoint Container Node Grid Block -->
                <div id="contact-channels-viewport-root" class="contact-links-grid"></div>
            </div>
        </section>
    </main>

    <!-- ======================================================================
       5. SYSTEM CLOSURE MATRICES LAYER (FOOTER LOGIC UNIT)
       ====================================================================== -->
    <footer style="border-top: 1px solid var(--border-rgba); padding: 40px 0; background-color: var(--bg-surface); font-size: 14px; color: var(--text-secondary);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
            <!-- Verification Cryptographic Tokens and Dynamic Temporal Chrono-Metrics -->
            <span>&copy; <span id="current-year-token"></span> <span id="footer-branding-token"></span></span>
            <!-- Metadata Links Dynamic Arrays Mount Container Block Node -->
            <div style="display: flex; gap: 16px;" id="footer-links-viewport-root"></div>
        </div>
    </footer>

    <!-- ======================================================================
       6. LOGICAL COMPILATION SYSTEM ROUTING ENGINES
       ====================================================================== -->
    <script src="index.js"></script>
</body>
</html>
